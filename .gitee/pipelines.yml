# Gitee Go 流水线配置
version: '1.0'

name: postdog-build
displayName: 'Postdog 自动构建'

triggers:
  push:
    branches:
      - main
    tags:
      - v*

stages:
  - name: build-windows
    displayName: 'Windows构建'
    steps:
      - step: checkout@1
        name: '检出代码'
        
      - step: nodejs-install@1
        name: '安装Node.js'
        version: '18'
        
      - step: shell@1
        name: '安装Yarn'
        script:
          - npm install -g yarn
          
      - step: shell@1
        name: '安装依赖'
        script:
          - yarn install
          
      - step: shell@1
        name: '构建项目'
        script:
          - yarn build
          
      - step: shell@1
        name: '打包Windows'
        script:
          - yarn electron:pack --win
          
      - step: artifact-upload@1
        name: '上传制品'
        artifacts:
          - path: dist/*.exe
          - path: dist/*.zip
