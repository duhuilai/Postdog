# Gitee Go 流水线配置 - Linux构建
name: Build Linux
displayName: '构建Linux安装包'

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm build-essential

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build Browser
        run: yarn build:browser

      - name: Build Electron
        run: yarn build:electron

      - name: Package Linux Installer
        run: yarn electron:pack --linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: linux-installer
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
