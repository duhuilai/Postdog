# GitHub Actions 流水线配置 - 多平台构建
name: Build Postdog

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install Visual Studio Build Tools
        uses: microsoft/setup-msbuild@v2

      - name: Install Dependencies
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile --ignore-scripts
          npx electron-builder install-app-deps
          node ./scripts/afterInstall.js
          npx patch-package

      - name: Build Project
        run: yarn build

      - name: Package Windows Installer
        run: yarn electron:pack --win

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Postdog-Windows
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install Dependencies
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile

      - name: Build Project
        run: yarn build

      - name: Package macOS Installer
        run: yarn electron:pack --mac

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Postdog-macOS
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.dmg
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Linux Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm build-essential

      - name: Install Dependencies
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile

      - name: Build Project
        run: yarn build

      - name: Package Linux Installer
        run: yarn electron:pack --linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Postdog-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
